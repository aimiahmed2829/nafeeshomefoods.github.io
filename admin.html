<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafis Foods | Seller Dashboard</title>
    <link class="icon" type="image/jpeg" href="logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --bg: #f5f7fb; --white: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: var(--bg); color: #333; padding-bottom: 50px; }
        
        /* Top Navigation Bar */
        .top-nav { background: var(--dark); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: var(--gold); }
        .brand-box { display: flex; align-items: center; gap: 12px; }
        .brand-box i { font-size: 1.8rem; }
        .brand-box h1 { margin: 0; font-size: 1.3rem; line-height: 1.1; font-weight: 700; }
        .cloud-status { border: 1px solid var(--gold); border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; text-align: left; line-height: 1.2; }
        .cloud-status i { font-size: 1rem; }

        .dashboard-container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        /* Earnings Banner */
        .earnings-banner { background: var(--dark); color: var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .earnings-banner h2 { margin: 0; font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; }
        .earnings-banner .amount { font-size: 1.8rem; font-weight: bold; }

        /* Section Cards (Accordions) */
        .status-section { background: var(--white); border-radius: 15px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .status-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; font-size: 1rem; border-top: 5px solid transparent; }
        .count-badge { background: #fdf6e8; color: #b58d13; padding: 2px 10px; border-radius: 12px; font-size: 0.85rem; }
        
        /* Specific Section Colors */
        .sec-pending .status-header { border-color: #ffc107; color: #333; }
        .sec-cooking .status-header { border-color: #007bff; color: #333; }
        .sec-ready .status-header { border-color: #28a745; color: #333; }
        .sec-history .status-header { border-color: #6c757d; color: #333; }

        .order-list { padding: 10px; display: block; }

        /* Individual Order Card Inside List */
        .order-mini-card { border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 10px; position: relative; }
        .mini-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        .cust-name { font-weight: bold; font-size: 1.1rem; color: #222; margin-bottom: 5px; }
        .item-line { font-size: 0.9rem; padding: 3px 0; border-bottom: 1px dashed #f0f0f0; }
        .proof-btn { background: #f0f7ff; color: #007bff; border: none; padding: 8px; border-radius: 6px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .status-change-btn { background: #333; color: var(--gold); border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }

        /* Review Panel */
        .review-card { background: white; border-radius: 12px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--gold); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .reply-area { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; resize: none; box-sizing: border-box;}
        .reply-btn { background: var(--dark); color: var(--gold); border: none; padding: 8px 15px; border-radius: 6px; margin-top: 5px; cursor: pointer; font-weight: bold; }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="brand-box">
        <i class="fas fa-utensils"></i>
        <h1>Nafis Foods |<br>Seller Dashboard</h1>
    </div>
    <div class="cloud-status">
        <i class="fas fa-sync-alt"></i>
        <span>Connected<br>to Cloud</span>
    </div>
</div>

<div class="dashboard-container">
    <div class="earnings-banner">
        <div>
            <h2>Total Earned</h2>
            <div class="amount">$<span id="total-earnings">0</span></div>
        </div>
        <i class="fas fa-wallet" style="font-size: 2rem; opacity: 0.3;"></i>
    </div>

    <div class="status-section sec-pending">
        <div class="status-header">New Pending <span class="count-badge" id="count-pending">0</span></div>
        <div class="order-list" id="list-pending"></div>
    </div>

    <div class="status-section sec-cooking">
        <div class="status-header">Cooking / Kitchen <span class="count-badge" id="count-preparing">0</span></div>
        <div class="order-list" id="list-preparing"></div>
    </div>

    <div class="status-section sec-ready">
        <div class="status-header">Ready for Pickup <span class="count-badge" id="count-ready">0</span></div>
        <div class="order-list" id="list-ready"></div>
    </div>

    <div class="status-section sec-history">
        <div class="status-header">Completed History <span class="count-badge" id="count-completed">0</span></div>
        <div class="order-list" id="list-completed"></div>
    </div>

    <h2 style="margin-top: 30px; font-size: 1.2rem;"><i class="fas fa-star" style="color:var(--gold);"></i> Customer Reviews</h2>
    <div id="admin-reviews-list"></div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0Ugl8OiCZwWKr2PkgztZKALdEz-gmLSY",
        authDomain: "nafis-foods.firebaseapp.com",
        projectId: "nafis-foods",
        storageBucket: "nafis-foods.firebasestorage.app",
        messagingSenderId: "856645833481",
        appId: "1:856645833481:web:f18f1d582b280d083239d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messaging = getMessaging(app);

    let initialLoad = false;

    // Push Notifications Registration
    async function setupNotifications() {
        if (Notification.permission === 'default') await Notification.requestPermission();
        if (Notification.permission === 'granted') {
            const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
            await getToken(messaging, { 
                vapidKey: "BFx1PxB2B1nHzQ5Zpz8bBaIQj5qMs3HXZ_dIgnyDHqbQC-biOOfjhMSTru-DtPB8ENUDZornXJjyXASSL3HL4ok", 
                serviceWorkerRegistration: reg 
            });
        }
    }
    setupNotifications();

    // Data Sync Logic
    onValue(ref(db, 'orders'), (snap) => {
        const data = snap.val();
        const lists = { pending: [], preparing: [], ready: [], completed: [], cancelled: [] };
        let totalEarnings = 0;

        if (data) {
            Object.keys(data).forEach(key => {
                const order = data[key];
                order.dbKey = key;
                const status = order.status || 'pending';
                if (lists[status]) lists[status].push(order);
                
                // Calculate Earnings from Completed Orders
                if (status === 'completed' && order.items) {
                    Object.values(order.items).forEach(i => totalEarnings += (i.price * i.qty));
                }
            });
        }

        if (initialLoad && Notification.permission === 'granted') {
            new Notification("Nafis Foods: Update!", { body: "Orders status or new order received.", icon: "logo.jpg" });
        }
        initialLoad = true;

        document.getElementById('total-earnings').innerText = totalEarnings;
        renderList('pending', lists.pending);
        renderList('preparing', lists.preparing);
        renderList('ready', lists.ready);
        renderList('completed', lists.completed);
    });

    function renderList(status, orders) {
        const container = document.getElementById(`list-${status}`);
        document.getElementById(`count-${status}`).innerText = orders.length;
        container.innerHTML = orders.length ? "" : `<p style="color:#aaa; font-size:0.8rem; text-align:center;">No orders here.</p>`;

        orders.reverse().forEach(o => {
            const card = document.createElement('div');
            card.className = 'order-mini-card';
            
            let itemLines = "";
            if (o.items) Object.values(o.items).forEach(i => {
                itemLines += `<div class="item-line"><strong>${i.qty}x</strong> ${i.name} ${i.spice?`(${i.spice})`:''}</div>`;
            });

            card.innerHTML = `
                <div class="mini-row"><span>ID: #${o.id}</span><span>${o.time}</span></div>
                <div class="cust-name">${o.name}</div>
                <div style="font-size:0.85rem; margin-bottom:10px;"><i class="fas fa-phone"></i> ${o.phone}</div>
                <div class="items-list">${itemLines}</div>
                ${o.proofImage ? `<button class="proof-btn" onclick="openProof('${o.proofImage}')">View Receipt</button>` : ''}
                ${status !== 'completed' ? `
                    <select class="status-change-btn" onchange="updateStatus('${o.dbKey}', this.value)">
                        <option value="" disabled selected>Move Order to...</option>
                        <option value="pending">Move to Pending</option>
                        <option value="preparing">Start Cooking</option>
                        <option value="ready">Mark as Ready</option>
                        <option value="completed">Complete Order</option>
                        <option value="cancelled">Cancel Order</option>
                    </select>
                ` : '<div style="color:#28a745; font-weight:bold; font-size:0.8rem; margin-top:10px;"><i class="fas fa-check-circle"></i> Transaction Finished</div>'}
            `;
            container.appendChild(card);
        });
    }

    // Review Management
    onValue(ref(db, 'reviews'), (snap) => {
        const container = document.getElementById('admin-reviews-list');
        container.innerHTML = "";
        const data = snap.val();
        if (!data) return;

        Object.keys(data).reverse().forEach(key => {
            const r = data[key];
            const card = document.createElement('div');
            card.className = 'review-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>${r.name}</span> <span style="color:var(--gold);">${r.stars} ★</span></div>
                <p style="font-size:0.9rem; font-style:italic;">"${r.comment}"</p>
                ${r.adminReply ? `<div style="background:#f4f4f4; padding:8px; border-radius:6px; font-size:0.85rem; margin-top:5px;"><strong>Your Reply:</strong> ${r.adminReply}</div>` : ''}
                <textarea class="reply-area" id="reply-to-${key}" placeholder="Type your reply..."></textarea>
                <button class="reply-btn" onclick="submitReply('${key}')">Post Reply</button>
            `;
            container.appendChild(card);
        });
    });

    window.updateStatus = (key, val) => update(ref(db, `orders/${key}`), { status: val });
    window.openProof = (src) => { document.getElementById('lb-img').src = src; document.getElementById('lightbox').style.display = 'flex'; };
    window.submitReply = (key) => {
        const text = document.getElementById(`reply-to-${key}`).value;
        if (text) update(ref(db, `reviews/${key}`), { adminReply: text }).then(() => alert("Reply sent!"));
    };
</script>

</body>
</html>
