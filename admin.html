<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafis Foods | Seller Dashboard</title>
    <link class="icon" type="image/jpeg" href="logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; --bg: #f5f7fb; --white: #ffffff; --red: #d9534f; --blue: #0275d8; --green: #5cb85c; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background-color: var(--bg); color: #333; padding-bottom: 50px; }
        
        .top-nav { background: var(--dark); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: var(--gold); }
        .brand-box { display: flex; align-items: center; gap: 12px; }
        .brand-box h1 { margin: 0; font-size: 1.3rem; line-height: 1.1; font-weight: 700; }
        .cloud-status { border: 1px solid var(--gold); border-radius: 20px; padding: 5px 12px; font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }

        .dashboard-container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .earnings-banner { background: var(--dark); color: var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .earnings-banner .amount { font-size: 1.8rem; font-weight: bold; }

        .status-section { background: var(--white); border-radius: 15px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .status-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border-top: 5px solid transparent; }
        .count-badge { background: #fdf6e8; color: #b58d13; padding: 2px 10px; border-radius: 12px; font-size: 0.85rem; }
        
        .sec-pending .status-header { border-color: #ffc107; }
        .sec-cooking .status-header { border-color: var(--blue); }
        .sec-ready .status-header { border-color: var(--green); }
        .sec-history .status-header { border-color: #6c757d; }

        .order-mini-card { border: 1px solid #eee; border-radius: 10px; padding: 15px; margin: 10px; }
        .cust-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .item-line { font-size: 0.9rem; padding: 3px 0; border-bottom: 1px dashed #f0f0f0; }

        /* Action Buttons Styling */
        .action-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-cancel { background-color: var(--red); }
        .btn-accept { background-color: var(--blue); }
        .btn-ready { background-color: var(--gold); color: var(--dark); }
        .btn-complete { background-color: var(--green); }
        .btn:active { transform: scale(0.96); }

        .proof-btn { background: #f0f7ff; color: var(--blue); border: 1px solid #cce5ff; padding: 8px; border-radius: 6px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }

        .review-card { background: white; border-radius: 12px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--gold); }
        .reply-area { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; resize: none; box-sizing: border-box;}
        .reply-btn { background: var(--dark); color: var(--gold); border: none; padding: 8px 15px; border-radius: 6px; margin-top: 5px; cursor: pointer; font-weight: bold; }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="brand-box"><h1>Nafis Foods |<br>Seller Dashboard</h1></div>
    <div class="cloud-status"><i class="fas fa-sync-alt"></i><span>Connected</span></div>
</div>

<div class="dashboard-container">
    <div class="earnings-banner">
        <div><h2>Total Earned</h2><div class="amount">$<span id="total-earnings">0</span></div></div>
        <i class="fas fa-wallet" style="font-size: 2rem; opacity: 0.3;"></i>
    </div>

    <div class="status-section sec-pending">
        <div class="status-header">New Pending <span class="count-badge" id="count-pending">0</span></div>
        <div id="list-pending"></div>
    </div>

    <div class="status-section sec-cooking">
        <div class="status-header">Cooking / Kitchen <span class="count-badge" id="count-preparing">0</span></div>
        <div id="list-preparing"></div>
    </div>

    <div class="status-section sec-ready">
        <div class="status-header">Ready for Pickup <span class="count-badge" id="count-ready">0</span></div>
        <div id="list-ready"></div>
    </div>

    <div class="status-section sec-history">
        <div class="status-header">Completed History <span class="count-badge" id="count-completed">0</span></div>
        <div id="list-completed"></div>
    </div>

    <h2 style="margin-top: 30px; font-size: 1.2rem;">Customer Reviews</h2>
    <div id="admin-reviews-list"></div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0Ugl8OiCZwWKr2PkgztZKALdEz-gmLSY",
        authDomain: "nafis-foods.firebaseapp.com",
        projectId: "nafis-foods",
        storageBucket: "nafis-foods.firebasestorage.app",
        messagingSenderId: "856645833481",
        appId: "1:856645833481:web:f18f1d582b280d083239d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messaging = getMessaging(app);

    // Notifications
    async function setupNotifications() {
        if (Notification.permission === 'granted') {
            const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
            await getToken(messaging, { vapidKey: "BFx1PxB2B1nHzQ5Zpz8bBaIQj5qMs3HXZ_dIgnyDHqbQC-biOOfjhMSTru-DtPB8ENUDZornXJjyXASSL3HL4ok", serviceWorkerRegistration: reg });
        }
    }
    setupNotifications();

    onValue(ref(db, 'orders'), (snap) => {
        const data = snap.val();
        const lists = { pending: [], preparing: [], ready: [], completed: [] };
        let earnings = 0;

        if (data) {
            Object.keys(data).forEach(key => {
                const o = data[key]; o.dbKey = key;
                const s = o.status || 'pending';
                if (lists[s]) lists[s].push(o);
                if (s === 'completed' && o.items) Object.values(o.items).forEach(i => earnings += (i.price * i.qty));
            });
        }
        document.getElementById('total-earnings').innerText = earnings;
        ['pending', 'preparing', 'ready', 'completed'].forEach(s => renderOrders(s, lists[s]));
    });

    function renderOrders(status, orders) {
        const container = document.getElementById(`list-${status}`);
        document.getElementById(`count-${status}`).innerText = orders.length;
        container.innerHTML = "";

        orders.reverse().forEach(o => {
            const card = document.createElement('div');
            card.className = 'order-mini-card';
            let itemsHtml = "";
            if (o.items) Object.values(o.items).forEach(i => itemsHtml += `<div class="item-line"><strong>${i.qty}x</strong> ${i.name}</div>`);

            // Logic to show specific buttons based on status
            let actionButtons = "";
            if (status === 'pending') {
                actionButtons = `
                    <div class="action-group">
                        <button class="btn btn-cancel" onclick="updateStatus('${o.dbKey}','cancelled')"><i class="fas fa-times"></i> Cancel</button>
                        <button class="btn btn-accept" onclick="updateStatus('${o.dbKey}','preparing')"><i class="fas fa-check"></i> Accept Order</button>
                    </div>`;
            } else if (status === 'preparing') {
                actionButtons = `
                    <div class="action-group">
                        <button class="btn btn-ready" onclick="updateStatus('${o.dbKey}','ready')"><i class="fas fa-utensils"></i> Ready for Pickup</button>
                    </div>`;
            } else if (status === 'ready') {
                actionButtons = `
                    <div class="action-group">
                        <button class="btn btn-complete" onclick="updateStatus('${o.dbKey}','completed')"><i class="fas fa-flag-checkered"></i> Mark Completed</button>
                    </div>`;
            }

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#888;"><span>#${o.id}</span><span>${o.time}</span></div>
                <div class="cust-name">${o.name}</div>
                <div style="font-size:0.85rem;"><i class="fas fa-phone"></i> ${o.phone}</div>
                <div style="margin:10px 0;">${itemsHtml}</div>
                ${o.proofImage ? `<button class="proof-btn" onclick="openProof('${o.proofImage}')">View Payment Proof</button>` : ''}
                ${actionButtons}
            `;
            container.appendChild(card);
        });
    }

    // Reviews Stream
    onValue(ref(db, 'reviews'), (snap) => {
        const container = document.getElementById('admin-reviews-list');
        container.innerHTML = "";
        const data = snap.val();
        if (!data) return;
        Object.keys(data).reverse().forEach(key => {
            const r = data[key];
            const div = document.createElement('div');
            div.className = 'review-card';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;"><strong>${r.name}</strong><span>${r.stars}★</span></div>
                <p style="font-size:0.9rem; margin:5px 0;">"${r.comment}"</p>
                ${r.adminReply ? `<div style="background:#eee; padding:5px; font-size:0.8rem; border-radius:4px;"><strong>You:</strong> ${r.adminReply}</div>` : ''}
                <textarea class="reply-area" id="rep-${key}" placeholder="Reply to customer..."></textarea>
                <button class="reply-btn" onclick="sendReply('${key}')">Post Reply</button>
            `;
            container.appendChild(div);
        });
    });

    window.updateStatus = (key, s) => update(ref(db, `orders/${key}`), { status: s });
    window.openProof = (src) => { document.getElementById('lb-img').src = src; document.getElementById('lightbox').style.display = 'flex'; };
    window.sendReply = (key) => {
        const t = document.getElementById(`rep-${key}`).value;
        if(t) update(ref(db, `reviews/${key}`), { adminReply: t }).then(() => alert("Reply posted!"));
    };
</script>
</body>
</html>
