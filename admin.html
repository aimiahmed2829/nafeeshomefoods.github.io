<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0Ugl8OiCZwWKr2PkgztZKALdEz-gmLSY",
        authDomain: "nafis-foods.firebaseapp.com",
        projectId: "nafis-foods",
        storageBucket: "nafis-foods.firebasestorage.app",
        messagingSenderId: "856645833481",
        appId: "1:856645833481:web:f18f1d582b280d083239d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messaging = getMessaging(app);

    let initialLoadComplete = false;

    // Immediately trigger browser request for permission for you (the seller)
    async function initSellerNotifications() {
        if (Notification.permission === 'default') {
            await Notification.requestPermission();
        }
        if (Notification.permission === 'granted') {
            const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
            await getToken(messaging, { 
                vapidKey: "BFx1PxB2B1nHzQ5Zpz8bBaIQj5qMs3HXZ_dIgnyDHqbQC-biOOfjhMSTru-DtPB8ENUDZornXJjyXASSL3HL4ok", // <-- PASTE SAME VAPID KEY HERE TOO
                serviceWorkerRegistration: reg 
            });
        }
    }
    window.addEventListener('load', initSellerNotifications);

    // Watch incoming orders list
    onValue(ref(db, 'orders'), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // If a new order arrives after loading the page, trigger a system notification banner
        if (initialLoadComplete) {
            const latestOrder = Object.values(data).pop();
            if (Notification.permission === 'granted') {
                new Notification("🚨 New Nafis Foods Order!", {
                    body: `Order from ${latestOrder.name} (${latestOrder.phone}) total item count: ${Object.keys(latestOrder.items || {}).length}`,
                    icon: 'logo.jpg'
                });
            }
        }
        initialLoadComplete = true;
        
        // (Your existing layout building block loop code to render cards to dashboard stays here)
    });
</script>
